services:
  backend:
    build:
      context: ./backend
    container_name: messagemate-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
    container_name: messagemate-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
